# ============================================================
#  Location of this file:
#    ~/.hermes/config.yaml   (inside WSL Ubuntu)
#    i.e. /home/<YOUR_USER>/.hermes/config.yaml
#
#  Main Hermes Agent configuration.
#  Provider: ZAI (z.ai / GLM-4.6)
